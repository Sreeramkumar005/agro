name: agro
description: "HybridCropNet - AI Crop Disease Detection & Plant Health Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # AI Inference
  onnxruntime: ^1.0.0

  # Camera & Image
  image_picker: ^1.0.7
  image: ^4.1.7

  # Charts
  fl_chart: ^0.68.0

  # UI & Animation
  flutter_spinkit: ^5.2.0
  shimmer: ^3.0.0

  # Typography
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.3.3

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/hybridcropnet.onnx
    - assets/models/labels.txt
